version: "2"
run:
  modules-download-mode: readonly
  allow-parallel-runners: true
  concurrency: 4
  tests: false
  timeout: 10m
linters:
  default: none
  enable:
    - copyloopvar
    - errcheck
    - errname
    - errorlint
    - goconst
    - gocritic
    - gocyclo
    - govet
    - importas
    - ineffassign
    - misspell
    - prealloc
    - staticcheck
    - usestdlibvars
    - wastedassign
    - whitespace
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
      - (^|/)ai-proxy($|/) # ai-proxy module is deprecated
    rules:
      # Parameter docs for Liquid filters are repetitive string tables, not domain constants.
      - path: (^|/)polly/template($|/)
        linters:
          - goconst
      # Proto-gen repeats field names for validation errors.
      - path: .*\.pb\.validate\.go$
        linters:
          - goconst
      # AgentRun reconciliation intentionally centralizes a large state machine.
      - path: (^|/)deployment-operator/internal/controller/agentrun_controller\.go$
        linters:
          - gocyclo
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
