apiVersion: v1
kind: Secret
metadata:
  name: workbench-tool-creds
  namespace: default
stringData:
  token: "placeholder"
  password: "placeholder"
  apiKey: "placeholder"
  appKey: "placeholder"
  platformToken: "placeholder"
  accessKeyId: "placeholder"
  secretAccessKey: "placeholder"
  clientSecret: "placeholder"
  accessToken: "placeholder"
  apiToken: "placeholder"
---
apiVersion: deployments.plural.sh/v1alpha1
kind: WorkbenchTool
metadata:
  labels:
    app.kubernetes.io/name: workbenchtool
    app.kubernetes.io/instance: workbenchtool-sample
    app.kubernetes.io/part-of: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: controller
  name: workbenchtool-sample
  namespace: default
spec:
  name: workbenchtool_sample
  tool: HTTP
  categories:
    - INTEGRATION
  configuration:
    http:
      url: https://api.example.com/health
      method: GET
      inputSchema:
        type: object
        properties:
          endpoint:
            type: string
        required:
          - endpoint
---
apiVersion: deployments.plural.sh/v1alpha1
kind: WorkbenchTool
metadata:
  labels:
    app.kubernetes.io/name: workbenchtool
    app.kubernetes.io/instance: workbenchtool-http-post-sample
    app.kubernetes.io/part-of: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: controller
  name: workbenchtool-http-post-sample
  namespace: default
spec:
  name: workbenchtool_http_post_sample
  tool: HTTP
  categories:
    - INTEGRATION
  configuration:
    http:
      url: https://api.example.com/query
      method: POST
      headers:
        - name: Content-Type
          value: application/json
      body: '{"query": "{{ query }}"}'
      inputSchema:
        type: object
        properties:
          query:
            type: string
        required:
          - query
---
apiVersion: deployments.plural.sh/v1alpha1
kind: WorkbenchTool
metadata:
  labels:
    app.kubernetes.io/name: workbenchtool
    app.kubernetes.io/instance: workbenchtool-prometheus-sample
    app.kubernetes.io/part-of: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: controller
  name: workbenchtool-prometheus-sample
  namespace: default
spec:
  name: workbenchtool_prometheus_sample
  tool: PROMETHEUS
  categories:
    - METRICS
  configuration:
    prometheus:
      url: https://prometheus.example.com
      username: admin
      tokenSecretRef:
        name: workbench-tool-creds
        key: token
      passwordSecretRef:
        name: workbench-tool-creds
        key: password
      tenantId: my-tenant
