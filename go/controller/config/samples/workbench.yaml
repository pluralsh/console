apiVersion: deployments.plural.sh/v1alpha1
kind: WorkbenchTool
metadata:
  labels:
    app.kubernetes.io/name: workbenchtool
    app.kubernetes.io/instance: workbenchtool-cloudwatch-sample
    app.kubernetes.io/part-of: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: controller
  name: workbenchtool-cloudwatch-sample
  namespace: default
spec:
  name: workbenchtool_cloudwatch_sample
  tool: CLOUDWATCH
  categories:
