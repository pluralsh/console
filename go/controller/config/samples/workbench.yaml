apiVersion: deployments.plural.sh/v1alpha1
kind: WorkbenchTool
metadata:
  labels:
    app.kubernetes.io/name: workbenchtool
    app.kubernetes.io/instance: workbenchtool-sample
    app.kubernetes.io/part-of: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: controller
  name: workbenchtool-sample
  namespace: default
spec:
  name: workbenchtool_sample
  tool: HTTP
  configuration:
    http:
      url: https://api.example.com/health
      method: GET
      inputSchema:
        type: object
        properties:
          endpoint:
            type: string
            description: API endpoint to check
        required:
          - endpoint
---
apiVersion: deployments.plural.sh/v1alpha1
kind: WorkbenchTool
metadata:
  labels:
    app.kubernetes.io/name: workbenchtool
    app.kubernetes.io/instance: workbenchtool-metrics-sample
    app.kubernetes.io/part-of: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: controller
  name: workbenchtool-metrics-sample
  namespace: default
spec:
  name: workbenchtool_metrics_sample
  tool: HTTP
  categories:
    - INTEGRATION
  configuration:
    http:
      url: https://metrics.example.com/query
      method: POST
      headers:
        - name: Content-Type
          value: application/json
      inputSchema:
        type: object
        properties:
          query:
            type: string
            description: Metrics query string
          timeRange:
            type: object
            properties:
              start:
                type: string
                format: date-time
              end:
                type: string
                format: date-time
        required:
          - query
---
apiVersion: deployments.plural.sh/v1alpha1
kind: Workbench
metadata:
  labels:
    app.kubernetes.io/name: workbench
    app.kubernetes.io/instance: workbench-sample
    app.kubernetes.io/part-of: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: controller
  name: workbench-sample
  namespace: default
spec:
  name: workbench-sample
  description: Sample AI workbench with HTTP tools
  agentRuntime: mgmt/gemini
  toolRefs:
    - name: workbenchtool-sample
      namespace: default
    - name: workbenchtool-metrics-sample
      namespace: default
---
apiVersion: deployments.plural.sh/v1alpha1
kind: WorkbenchCron
metadata:
  labels:
    app.kubernetes.io/name: workbenchcron
    app.kubernetes.io/instance: workbenchcron-sample
    app.kubernetes.io/part-of: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: controller
  name: workbenchcron-sample
  namespace: default
spec:
  workbenchRef:
    name: workbench-sample
    namespace: default
  crontab: "0 * * * *"
  prompt: Check the health of all monitored API endpoints and summarize any issues found.
---
apiVersion: deployments.plural.sh/v1alpha1
kind: WorkbenchWebhook
metadata:
  labels:
    app.kubernetes.io/name: workbenchwebhook
    app.kubernetes.io/instance: workbenchwebhook-sample
    app.kubernetes.io/part-of: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: controller
  name: workbenchwebhook-sample
  namespace: default
spec:
  workbenchRef:
    name: workbench-sample
    namespace: default
  name: workbenchwebhook-sample
  webhookName: test
  matches:
    substring: "error"
    caseInsensitive: true
  prompt: Analyze the incoming alert and suggest remediation steps.
