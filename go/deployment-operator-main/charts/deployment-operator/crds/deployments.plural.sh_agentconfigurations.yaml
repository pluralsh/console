---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: agentconfigurations.deployments.plural.sh
spec:
  group: deployments.plural.sh
  names:
    kind: AgentConfiguration
    listKind: AgentConfigurationList
    plural: agentconfigurations
    singular: agentconfiguration
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AgentConfiguration is the deployment operator configuration
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentConfigurationSpec defines the desired state of AgentConfiguration
            properties:
              baseRegistryURL:
                description: |-
                  BaseRegistryURL allows overriding the default base registry URL.
                  For stack run jobs, agent run pods, sentinel run jobs.
                type: string
              clusterPingInterval:
                description: |-
                  ClusterPingInterval specifies the interval at which the agent pings the cluster.
                  Set to "0s" to disable cluster pings.
                type: string
              compatibilityUploadInterval:
                description: |-
                  CompatibilityUploadInterval determines how frequently the agent uploads compatibility data.
                  Set to "0s" to disable compatibility uploads.
                type: string
              maxAgentRunPods:
                description: |-
                  MaxAgentRunPods limits the number of concurrent agent run pods that can be active at any given time.
                  Must be greater than 0. Set this field to nil (omit) to disable the limit.
                minimum: 1
                type: integer
              disableWebsocket:
                description: |-
                  DisableWebsocket disables the cluster websocket connection to the Console.
                  When enabled, the agent will rely exclusively on polling instead of receiving
                  push updates. This is useful in large-scale edge deployments where maintaining
                  persistent websocket connections has an infeasible network cost.
                type: boolean
              maxConcurrentReconciles:
                description: |-
                  MaxConcurrentReconciles controls the maximum number of concurrent reconcile loops.
                  Higher values can increase throughput at the cost of resource usage.
                type: integer
              maxSentinelRunJobs:
                description: |-
                  MaxSentinelRunJobs limits the number of concurrent SentinelRunJobs that can be active at any given time.
                  Must be greater than 0. Set this field to nil (omit) to disable the limit.
                minimum: 1
                type: integer
              maxStackRunJobs:
                description: |-
                  MaxStackRunJobs limits the number of concurrent StackRunJobs that can be active at any given time.
                  Must be greater than 0. Set this field to nil (omit) to disable the limit.
                minimum: 1
                type: integer
              pipelineGateInterval:
                description: |-
                  PipelineGateInterval specifies how frequently the agent checks pipeline gates.
                  Set to "0s" to disable pipeline gate checks.
                type: string
              servicePollInterval:
                description: |-
                  ServicePollInterval defines how often the agent polls for services.
                  Expected format is a duration string (e.g., "30s", "5m").
                  Set to "0s" to disable service polling.
                type: string
              stackPollInterval:
                description: |-
                  StackPollInterval sets how often the agent polls for stack updates or changes.
                  Set to "0s" to disable stack polling.
                type: string
              vulnerabilityReportUploadInterval:
                description: |-
                  VulnerabilityReportUploadInterval sets how often vulnerability reports are uploaded.
                  Set to "0s" to disable vulnerability report uploads.
                type: string
            type: object
          status:
            properties:
              conditions:
                description: Represents the observations of a PrAutomation's current
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              id:
                description: ID of the resource in the Console API.
                type: string
              sha:
                description: SHA of last applied configuration.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
