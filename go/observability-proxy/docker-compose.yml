services:
  mock-console:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PACKAGE: ./cmd/mock-console
    environment:
      MOCK_CONSOLE_ADDR: ${MOCK_CONSOLE_ADDR:-:50051}
      MOCK_PROMETHEUS_HOST: ${MOCK_PROMETHEUS_HOST:-}
      MOCK_ELASTIC_HOST: ${MOCK_ELASTIC_HOST:-}

  observability-proxy:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PACKAGE: ./cmd/proxy
    depends_on:
      - mock-console
    command:
      - --listen-addr=:8080
      - --console-grpc-endpoint=mock-console:50051
      - --config-ttl=5s
      - --grpc-timeout=5s
      - --upstream-timeout=10s
      - --v=4
    ports:
      - "8080:8080"

  prom-remote-write:
    image: prom/prometheus:v2.55.1
    depends_on:
      - observability-proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint:
      - /bin/sh
      - -ec
    environment:
      PROM_REMOTE_WRITE_URL: ${PROM_REMOTE_WRITE_URL:-http://host.docker.internal:8080/ext/v1/ingest/prometheus}
      PROM_REMOTE_WRITE_USERNAME: ${PROM_REMOTE_WRITE_USERNAME:-}
      PROM_REMOTE_WRITE_PASSWORD: ${PROM_REMOTE_WRITE_PASSWORD:-}
    command:
      - /scripts/prom-remote-write.sh
    volumes:
      - ./scripts/prom-remote-write.sh:/scripts/prom-remote-write.sh:ro
    ports:
      - "19090:9090"
