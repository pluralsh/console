fragment WorkbenchFragment on Workbench {
    id
    name
    description
    systemPrompt
    project {
        ...TinyProjectFragment
    }
    repository {
        ...GitRepositoryFragment
    }
    agentRuntime {
        ...TinyAgentRuntimeFragment
    }
    configuration {
        coding {
            mode
            repositories
        }
        infrastructure {
            services
            stacks
            kubernetes
        }
        observability {
            logs
            metrics
        }
    }
    skills {
        ref {
            ref
            folder
            files
        }
        files
    }
    tools {
        ...WorkbenchToolFragment
    }
    readBindings {
        ...PolicyBindingFragment
    }
    writeBindings {
        ...PolicyBindingFragment
    }
    insertedAt
    updatedAt
}

fragment WorkbenchToolFragment on WorkbenchTool {
    id
    name
    tool
    categories
    project {
        ...TinyProjectFragment
    }
    mcpServer {
        ...MCPServerFragment
    }
    cloudConnection {
        ...CloudConnectionFragment
    }
    configuration {
        http {
            url
            method
            headers {
                name
                value
            }
            body
            inputSchema
        }
        elastic {
            index
            url
            username
        }
        prometheus {
            url
            username
            tenantId
        }
        loki {
            url
            username
            tenantId
        }
        splunk {
            url
            username
        }
        tempo {
            url
            username
            tenantId
        }
        jaeger {
            url
            username
        }
        datadog {
            site
        }
        dynatrace {
            url
        }
        cloudwatch {
            region
            logGroupNames
            roleArn
            roleSessionName
        }
        azure {
            subscriptionId
            tenantId
            clientId
        }
        linear {
            url
        }
        atlassian {
            url
            email
        }
    }
    insertedAt
    updatedAt
}

mutation CreateWorkbench($attributes: WorkbenchAttributes!) {
    createWorkbench(attributes: $attributes) {
        ...WorkbenchFragment
    }
}

mutation UpdateWorkbench($id: ID!, $attributes: WorkbenchAttributes!) {
    updateWorkbench(id: $id, attributes: $attributes) {
        ...WorkbenchFragment
    }
}

mutation DeleteWorkbench($id: ID!) {
    deleteWorkbench(id: $id) {
        ...WorkbenchFragment
    }
}

mutation CreateWorkbenchTool($attributes: WorkbenchToolAttributes!) {
    createWorkbenchTool(attributes: $attributes) {
        ...WorkbenchToolFragment
    }
}

mutation UpdateWorkbenchTool($id: ID!, $attributes: WorkbenchToolAttributes!) {
    updateWorkbenchTool(id: $id, attributes: $attributes) {
        ...WorkbenchToolFragment
    }
}

mutation DeleteWorkbenchTool($id: ID!) {
    deleteWorkbenchTool(id: $id) {
        ...WorkbenchToolFragment
    }
}

query ListWorkbenches($after: String, $first: Int, $before: String, $last: Int, $q: String) {
    workbenches(after: $after, first: $first, before: $before, last: $last, q: $q) {
        edges {
            node {
                ...WorkbenchFragment
            }
        }
        pageInfo {
            ...PageInfoFragment
        }
    }
}

query GetWorkbench($id: ID, $name: String) {
    workbench(id: $id, name: $name) {
        ...WorkbenchFragment
    }
}

query GetWorkbenchTiny($id: ID, $name: String) {
    workbench(id: $id, name: $name) {
        id
        name
    }
}

query ListWorkbenchTools($after: String, $first: Int, $before: String, $last: Int, $q: String) {
    workbenchTools(after: $after, first: $first, before: $before, last: $last, q: $q) {
        edges {
            node {
                ...WorkbenchToolFragment
            }
        }
        pageInfo {
            ...PageInfoFragment
        }
    }
}

query GetWorkbenchTool($id: ID, $name: String) {
    workbenchTool(id: $id, name: $name) {
        ...WorkbenchToolFragment
    }
}

query GetWorkbenchToolTiny($id: ID, $name: String) {
    workbenchTool(id: $id, name: $name) {
        id
        name
    }
}

fragment WorkbenchCronFragment on WorkbenchCron {
    id
    crontab
    prompt
    workbench {
        id
        name
    }
}

fragment WorkbenchWebhookFragment on WorkbenchWebhook {
    id
    name
    prompt
    matches {
        regex
        substring
        caseInsensitive
    }
    webhook {
        id
        name
    }
    issueWebhook {
        id
        name
    }
    workbench {
        id
        name
    }
}

mutation CreateWorkbenchCron($workbenchId: ID!, $attributes: WorkbenchCronAttributes!) {
    createWorkbenchCron(workbenchId: $workbenchId, attributes: $attributes) {
        ...WorkbenchCronFragment
    }
}

mutation UpdateWorkbenchCron($id: ID!, $attributes: WorkbenchCronAttributes!) {
    updateWorkbenchCron(id: $id, attributes: $attributes) {
        ...WorkbenchCronFragment
    }
}

mutation DeleteWorkbenchCron($id: ID!) {
    deleteWorkbenchCron(id: $id) {
        ...WorkbenchCronFragment
    }
}

mutation GetWorkbenchCron($id: ID!) {
    workbenchCron(id: $id) {
        ...WorkbenchCronFragment
    }
}

mutation CreateWorkbenchWebhook($workbenchId: ID!, $attributes: WorkbenchWebhookAttributes!) {
    createWorkbenchWebhook(workbenchId: $workbenchId, attributes: $attributes) {
        ...WorkbenchWebhookFragment
    }
}

mutation UpdateWorkbenchWebhook($id: ID!, $attributes: WorkbenchWebhookAttributes!) {
    updateWorkbenchWebhook(id: $id, attributes: $attributes) {
        ...WorkbenchWebhookFragment
    }
}

mutation DeleteWorkbenchWebhook($id: ID!) {
    deleteWorkbenchWebhook(id: $id) {
        ...WorkbenchWebhookFragment
    }
}

mutation GetWorkbenchWebhook($id: ID!) {
    getWorkbenchWebhook(id: $id) {
        ...WorkbenchWebhookFragment
    }
}