global:
  additionalVolumes: ~
  additionalVolumeMounts: ~

consoleUrl: ""

nameOverride: ""

fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsUser: 65532

securityContext:
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

priorityClassName: ""

extraEnv: []

extraArgs: []

nodeSelector: {}

affinity: {}

tolerations: []

initContainers: []

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 128Mi

serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

metrics:
  enabled: false
  path: /metrics
  serviceMonitor:
    enabled: false
    additionalLabels: {}
    endpointConfig: {}

replicCount: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUAverageValue: 100m
  # targetCPUUtilizationPercentage: 75
  # targetMemoryUtilizationPercentage: 75

secrets:
  create: true
  api: ""
  privateapi: ""
  redis: ""

agent:
  path: /ext/kas

api:
  path: /api
  port: 8000

ingress:
  ingressClass: nginx
  kubernetesApiPath: /k8s-proxy
  tlsSecretName: kas-tls

  tls:
    enabled: true

  annotations:
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
