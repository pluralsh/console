{{- if .Values.observabilityProxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: console-observability-proxy
  labels:
    helm.sh/chart: {{ include "console.chart" . }}
    app.kubernetes.io/name: observability-proxy
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: observability-proxy
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
