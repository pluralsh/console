apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: console
  labels:
{{ include "console.labels" . | indent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClass }}
  {{ if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.ingress.console_dns | quote }}
    secretName: console-tls
  {{ end }}
  rules:
  - host: {{ .Values.ingress.console_dns | quote }}
    http:
      paths:
      - path: {{ .Values.kas.agent.path }}
        pathType: Prefix
        backend:
          service:
            name: {{ include "kas.serviceName" . }}
            port:
              number: {{ .Values.kas.service.agentProxyPort }}
      - path: {{ .Values.kas.api.path }}
        pathType: Prefix
        backend:
          service:
            name: {{ include "kas.serviceName" . }}
            port:
              number: {{ .Values.kas.api.port }}
      {{- if .Values.aiProxy.enabled }}
      - path: {{ .Values.aiProxy.config.server.path }}
        pathType: Prefix
        backend:
          service:
            name: console
            port:
              name: nexus-http
      {{- end }}
      {{- if .Values.observabilityProxy.enabled }}
      - path: /ext/v1/ingest
        pathType: Prefix
        backend:
          service:
            name: console-observability-proxy
            port:
              name: http
      - path: /ext/v1/query
        pathType: Prefix
        backend:
          service:
            name: console-observability-proxy
            port:
              name: http
      {{- end }}
      - path: /
        pathType: Prefix
        backend:
          service:
            name: console
            port:
              name: http
{{ if .Values.ingress.rewrite.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: console-kas-rewrite
  labels:
{{ include "console.labels" . | indent 4 }}
  annotations:
  {{- with .Values.ingress.rewrite.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClass }}
  {{ if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.ingress.console_dns | quote }}
    secretName: console-tls
  {{ end }}
  rules:
  - host: {{ .Values.ingress.console_dns | quote }}
    http:
      paths:
      - path: /kas(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: {{ include "kas.serviceName" . }}
            port:
              number: 8154
      - path: /ext/kas(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: {{ include "kas.serviceName" . }}
            port:
              number: 8150
{{ end }}
{{ if .Values.externalIngress.hostname }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: console-external
  labels:
{{ include "console.labels" . | indent 4 }}
  annotations:
  {{- with .Values.externalIngress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.externalIngress.ingressClass }}
  {{ if .Values.externalIngress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.externalIngress.hostname | quote }}
    secretName: console-external-tls
  {{ end }}
  rules:
  - host: {{ .Values.externalIngress.hostname | quote }}
    http:
      paths:
      - path: /ext/kas
        pathType: Prefix
        backend:
          service:
            name: {{ include "kas.serviceName" . }}
            port:
              number: 8180
      - path: /ext
        pathType: Prefix
        backend:
          service:
            name: console
            port:
              name: http
{{ end }}
