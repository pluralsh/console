{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: console
  labels:
{{ include "console.labels" . | indent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: console
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: {{ .Values.service.port }}
    - protocol: TCP
      port: 9090
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: console
          app.kubernetes.io/instance: {{ .Release.Name }}
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
    ports:
    - protocol: TCP
      port: 4369
    - protocol: TCP
      port: 6000
  {{- /* gRPC is only reachable from Nexus and observability-proxy pods; Nexus HTTP stays unscoped here. */}}
  {{- if or .Values.aiProxy.enabled .Values.observabilityProxy.enabled }}
  - from:
    {{- if .Values.aiProxy.enabled }}
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: nexus
          app.kubernetes.io/instance: {{ .Release.Name }}
    {{- end }}
    {{- if .Values.observabilityProxy.enabled }}
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: observability-proxy
          app.kubernetes.io/instance: {{ .Release.Name }}
    {{- end }}
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
    ports:
    - protocol: TCP
      port: 50051
  {{- end }}
{{- end }}
