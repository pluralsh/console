{{- if .Values.networkPolicy.consoleInternalPorts.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: console-internal-ports
  labels:
{{ include "console.labels" . | indent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: console
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: {{ .Values.service.port }}
    - protocol: TCP
      port: 9090
    {{- if .Values.aiProxy.enabled }}
    - protocol: TCP
      port: 8080
    {{- end }}
  # Erlang/OTP EPMD (4369): name-to-port lookups for RELEASE_DISTRIBUTION=name clustering.
  # Restrict to peer console replicas only — any other workload in the namespace can otherwise
  # query registered node names and learn distribution ports without authentication.
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: console
          app.kubernetes.io/instance: {{ .Release.Name }}
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
    ports:
    - protocol: TCP
      port: 4369
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
    ports:
    - protocol: TCP
      port: 50051
{{- end }}
