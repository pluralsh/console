{{- if and .Values.gatewayApi.enabled .Values.kas.ingress.kas_dns }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kas.fullname" . }}
  labels:
    {{- include "kas.labels" . | nindent 4 }}
  {{- include "console.gatewayApi.annotations" (dict "base" .Values.gatewayApi.annotations "extra" (.Values.gatewayApi.kas.annotations | default dict)) | nindent 2 }}
spec:
  parentRefs:
{{- include "console.gatewayApi.parentRefs" . | nindent 4 }}
{{- include "console.gatewayApi.hostnames" .Values.kas.ingress.kas_dns | nindent 2 }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.kas.ingress.kubernetesApiPath }}
    backendRefs:
    - name: {{ include "kas.serviceName" . }}
      port: {{ .Values.kas.service.kubernetesApiPort }}
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.kas.agent.path }}
    backendRefs:
    - name: {{ include "kas.serviceName" . }}
      port: {{ .Values.kas.service.agentProxyPort }}
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "kas.serviceName" . }}
      port: {{ .Values.kas.service.agentProxyPort }}
{{- end }}
