{{- if .Values.kas.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kas.serviceAccountName" . }}
  labels:
    {{- include "kas.labels" . | nindent 4 }}
  {{- with .Values.kas.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
