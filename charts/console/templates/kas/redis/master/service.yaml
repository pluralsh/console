{{- if (gt (int64 .Values.kas.redis.master.count) 0) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-master" (include "redis.fullname" .) }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.kas.redis.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: master
  {{- if or .Values.kas.redis.master.service.annotations .Values.kas.redis.commonAnnotations }}
  {{- $annotations := include "common.tplvalues.merge" ( dict "values" ( list .Values.kas.redis.master.service.annotations .Values.kas.redis.commonAnnotations ) "context" . ) }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" $annotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.kas.redis.master.service.type }}
  {{- if or (eq .Values.kas.redis.master.service.type "LoadBalancer") (eq .Values.kas.redis.master.service.type "NodePort") }}
  externalTrafficPolicy: {{ .Values.kas.redis.master.service.externalTrafficPolicy | quote }}
  {{- end }}
  internalTrafficPolicy: {{ .Values.kas.redis.master.service.internalTrafficPolicy }}
  {{- if and (eq .Values.kas.redis.master.service.type "LoadBalancer") (not (empty .Values.kas.redis.master.service.loadBalancerIP)) }}
  loadBalancerIP: {{ .Values.kas.redis.master.service.loadBalancerIP }}
  {{- end }}
  {{- if and (eq .Values.kas.redis.master.service.type "LoadBalancer")  .Values.kas.redis.master.service.loadBalancerClass }}
  loadBalancerClass: {{ .Values.kas.redis.master.service.loadBalancerClass }}
  {{- end }}
  {{- if and (eq .Values.kas.redis.master.service.type "LoadBalancer") (not (empty .Values.kas.redis.master.service.loadBalancerSourceRanges)) }}
  loadBalancerSourceRanges: {{ toYaml .Values.kas.redis.master.service.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  {{- if and .Values.kas.redis.master.service.clusterIP (eq .Values.kas.redis.master.service.type "ClusterIP") }}
  clusterIP: {{ .Values.kas.redis.master.service.clusterIP }}
  {{- end }}
  {{- if ne .Values.kas.redis.master.service.sessionAffinity "None"}}
  sessionAffinity: {{ .Values.kas.redis.master.service.sessionAffinity }}
  {{- if .Values.kas.redis.master.service.sessionAffinityConfig }}
  sessionAffinityConfig: {{- include "common.tplvalues.render" (dict "value" .Values.kas.redis.master.service.sessionAffinityConfig "context" $) | nindent 4 }}
  {{- end }}
  {{- end }}
  {{- if .Values.kas.redis.master.service.externalIPs }}
  externalIPs: {{- include "common.tplvalues.render" (dict "value" .Values.kas.redis.master.service.externalIPs "context" $) | nindent 4 }}
  {{- end }}
  ports:
    - name: {{ .Values.kas.redis.master.service.portNames.redis }}
      port: {{ .Values.kas.redis.master.service.ports.redis }}
      targetPort: redis
      {{- if and (or (eq .Values.kas.redis.master.service.type "NodePort") (eq .Values.kas.redis.master.service.type "LoadBalancer")) .Values.kas.redis.master.service.nodePorts.redis}}
      nodePort: {{ .Values.kas.redis.master.service.nodePorts.redis}}
      {{- else if eq .Values.kas.redis.master.service.type "ClusterIP" }}
      nodePort: null
      {{- end }}
    {{- if .Values.kas.redis.master.service.extraPorts }}
    {{- include "common.tplvalues.render" (dict "value" .Values.kas.redis.master.service.extraPorts "context" $) | nindent 4 }}
    {{- end }}
  {{- $podLabels := include "common.tplvalues.merge" ( dict "values" ( list .Values.kas.redis.master.podLabels .Values.kas.redis.commonLabels ) "context" . ) }}
  selector: {{- include "common.labels.matchLabels" ( dict "customLabels" $podLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: master
{{- end }}
