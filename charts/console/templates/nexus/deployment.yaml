{{- if .Values.aiProxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console-nexus
  annotations:
{{ include "console.annotations" . | nindent 4 }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
    {{- with .Values.aiProxy.podLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.aiProxy.autoscaling.enabled }}
  replicas: {{ .Values.aiProxy.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nexus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/nexus-config: {{ include (print $.Template.BasePath "/nexus-secret.yaml") . | sha256sum }}
        {{- with .Values.aiProxy.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "nexus.selectorLabels" . | nindent 8 }}
        {{- with .Values.aiProxy.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: console
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aiProxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aiProxy.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aiProxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: nexus
        {{- if .Values.console.containerSecurityContext }}
        securityContext:
        {{- toYaml .Values.console.containerSecurityContext | nindent 10 }}
        {{- end }}
        image: "{{ .Values.global.registry }}/{{ .Values.aiProxy.image.repository }}:{{ .Values.aiProxy.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.aiProxy.image.pullPolicy }}
        args:
        - --config=/home/nexus/config.yaml
        {{- if .Values.aiProxy.image.extraArgs }}
        {{- toYaml .Values.aiProxy.image.extraArgs | nindent 8 }}
        {{- end }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          {{- toYaml .Values.aiProxy.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.aiProxy.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.aiProxy.resources | nindent 10 }}
        volumeMounts:
        - name: nexus-config
          mountPath: /home/nexus
          readOnly: true
        {{ if .Values.global.additionalVolumeMounts }}
        {{ toYaml .Values.global.additionalVolumeMounts | nindent 8 }}
        {{ end }}
      volumes:
      - name: nexus-config
        secret:
          secretName: nexus-config
      {{ if .Values.global.additionalVolumes }}
      {{ toYaml .Values.global.additionalVolumes | nindent 6 }}
      {{ end }}
{{- end }}
