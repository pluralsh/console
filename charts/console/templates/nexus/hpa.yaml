{{- if and .Values.aiProxy.enabled .Values.aiProxy.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: console-nexus
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: console-nexus
  minReplicas: {{ .Values.aiProxy.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.aiProxy.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.aiProxy.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.aiProxy.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.aiProxy.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.aiProxy.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
