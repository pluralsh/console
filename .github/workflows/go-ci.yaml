name: CI / Go
on:
  push:
    branches:
      - "master"
    paths:
      - ".github/workflows/go-ci.yaml"
      - "go/**"
      - "schema/**"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/go-ci.yaml"
      - "go/**"
      - "schema/**"
permissions:
  contents: read
env:
  GOPATH: /home/runner/go/
  GOPROXY: "https://proxy.golang.org"
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: go/
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.work
          check-latest: true
      - run: PATH=$PATH:$GOPATH/bin make lint
