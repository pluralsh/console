name: CI / Kubernetes Agent
on:
  push:
    branches:
      - "master"
    paths:
      - ".github/workflows/kubernetes-agent-ci.yaml"
      - "go/kubernetes-agent/**"
      - "go/polly/**"
      - "go/client/**"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/kubernetes-agent-ci.yaml"
      - "go/kubernetes-agent/**"
      - "go/polly/**"
      - "go/client/**"
env:
  GOPATH: /home/runner/go/
  GOPROXY: "https://proxy.golang.org"
  REGISTRY_IMAGE: pluralsh/kubernetes-agent
jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
    defaults:
      run:
        shell: bash
        working-directory: go/kubernetes-agent
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.work
          check-latest: true
      - run: PATH=$PATH:$GOPATH/bin TARGET_DIRECTORY=. make -C api build

  build-kas:
    name: Build kas
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
    defaults:
      run:
        shell: bash
        working-directory: go/kubernetes-agent
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.work
          check-latest: true
      - run: PATH=$PATH:$GOPATH/bin TARGET_DIRECTORY=. make -C kas build-kas

  build-agentk:
    name: Build agentk
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
    defaults:
      run:
        shell: bash
        working-directory: go/kubernetes-agent
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.work
          check-latest: true
      - run: PATH=$PATH:$GOPATH/bin TARGET_DIRECTORY=. make -C kas build-agentk

  test:
    name: Unit test
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
    defaults:
      run:
        shell: bash
        working-directory: go/kubernetes-agent
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.work
          check-latest: true
      - run: PATH=$PATH:$GOPATH/bin make test

  build-image:
    name: Build agent image
    needs: [test]
    permissions:
      contents: 'read'
      packages: 'write'
    strategy:
      fail-fast: false
      matrix:
        platforms:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.platforms.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Prepare
        run: |
          platform=${{ matrix.platforms.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.REGISTRY_IMAGE }}
          tags: |
            type=sha
            type=ref,event=pr
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: go
          file: go/kubernetes-agent/hack/docker/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platforms.platform }}
          outputs: type=image,name=ghcr.io/${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=v0.0.0-${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish image
    needs: [build-image]
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      packages: 'write'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.REGISTRY_IMAGE }}
          tags: |
            type=sha
            type=ref,event=pr
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Login to Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
