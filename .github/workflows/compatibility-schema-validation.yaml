name: Validate Compatibility Schemas

on:
  pull_request:
    paths:
      - '.github/workflows/compatibility-schema-validation.yaml'
      - 'static/addons/**'
      - 'static/compatibilities/**'
      - 'static/compatibilities.yaml'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/compatibility-schema-validation.yaml'
      - 'static/addons/**'
      - 'static/compatibilities/**'
      - 'static/compatibilities.yaml'

permissions:
  contents: read

jobs:
  validate-compatibility-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate add-on compatibility tables
        uses: dsanders11/json-schema-validate-action@eddf079f55830cc9a916a3c512ba9086240d2fea
        with:
          schema: static/compatibilities/schema.json
          files: |
            static/compatibilities.yaml
            static/compatibilities/*.yaml
          all-errors: true

      - name: Validate cloud add-on compatibility tables
        uses: dsanders11/json-schema-validate-action@eddf079f55830cc9a916a3c512ba9086240d2fea
        with:
          schema: static/addons/schema.json
          files: |
            static/addons/*.yaml
          all-errors: true
