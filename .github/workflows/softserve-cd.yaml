name: CD / Softserve

on:
  pull_request:
    branches:
      - "master"
    paths:
      - ".github/workflows/softserve-cd.yaml"
      - "dockerfiles/Dockerfile.softserve"
      - dockerfiles/bin
  push:
    tags:
    - 'v*.*.*'
permissions:
  contents: read

env:
  DOCKER_METADATA_PR_HEAD_SHA: 'true'

jobs:
  test-softserve-docker:
    name: Test softserve container
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build softserve image for local test
        uses: docker/build-push-action@v6
        with:
          context: "./dockerfiles"
          file: "./dockerfiles/Dockerfile.softserve"
          load: true
          tags: softserve-local:test
          platforms: linux/amd64
          cache-from: type=gha
      - name: Run softserve container
        run: |
          docker run -d --name softserve-test \
            -p 23232:23232 \
            softserve-local:test
      - name: Wait for softserve HTTP endpoint
        run: |
          for i in {1..30}; do
            if git ls-remote "http://localhost:23232/deployment-operator.git" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "softserve did not become ready in time"
          docker logs softserve-test
          exit 1
      - name: Ensure deployment-operator repo is clonable
        run: |
          git clone "http://localhost:23232/deployment-operator.git" /tmp/deployment-operator
          test -d /tmp/deployment-operator/.git

  publish-softserve-docker:
    name: Build and push softserve
    needs: test-softserve-docker
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: 'read'
      id-token: 'write'
      packages: 'write'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: meta-softserve
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/pluralsh/git-server
            gcr.io/pluralsh/git-server
            docker.io/pluralsh/git-server
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
      - uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: 'projects/${{ secrets.GOOGLE_PROJECT_ID }}/locations/global/workloadIdentityPools/github/providers/github'
          service_account: 'terraform@pluralsh.iam.gserviceaccount.com'
          token_format: 'access_token'
          create_credentials_file: true
      - uses: google-github-actions/setup-gcloud@v1.0.1
      - name: Login to gcr
        run: gcloud auth configure-docker -q
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: mjgpluralsh
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build and push softserve
        uses: docker/build-push-action@v6
        with:
          context: "./dockerfiles"
          file: "./dockerfiles/Dockerfile.softserve"
          push: true
          tags: ${{ steps.meta-softserve.outputs.tags }}
          labels: ${{ steps.meta-softserve.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
