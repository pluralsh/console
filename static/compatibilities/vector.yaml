- version: 0.56.0
  kube: ['1.36', '1.35', '1.34']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: ''
    chart_updates: []
    features: ['New `databricks_zerobus` sink for streaming logs into Databricks Unity
        Catalog via Zerobus, including OAuth2 auth, schema fetching, and protobuf
        batching.', New `delay` transform to hold events for a fixed duration or conditionally
        (including VRL-based conditions)., HTTP-based sinks using shared retry helpers
        now support a `retry_strategy` option to choose which HTTP status codes should
        be retried (with an updated `http` sink example)., '`vector` sink adds `zstd`
        compression alongside `gzip` for improved Vector-to-Vector throughput and
        efficiency.', 'Major enhancements to `tag_cardinality_limit`: per-tag limits,
        per-metric tracking isolation, global tracked-key cap, and ability to opt
        metrics out of tracking.', '`aws_s3` sink Parquet encoding now ships enabled
        in official binaries by default (no special build required).', 'Fixes a CPU
        regression affecting sinks that use metric normalization (e.g., `prometheus_remote_write`,
        `aws_cloudwatch_metrics`, `statsd`).', Restores install support for RHEL/Rocky/Alma/CentOS
        Stream 8 that was broken in 0.55.0 due to a glibc requirement bump., Unit
        tests gain optional `expected_event_count` on outputs to assert how many events
        a transform emits.]
    breaking_changes: ['`greptimedb_metrics` and `greptimedb_logs` sinks now require
        GreptimeDB v1.x; GreptimeDB v0.x users must upgrade GreptimeDB before upgrading
        Vector.']
  chart_version: 0.56.0
  images: ['docker.io/timberio/vector:0.56.0-distroless-libc']
- version: 0.55.0
  kube: ['1.36', '1.35', '1.34']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: ''
    chart_updates: []
    features: ['New `windows_event_log` source for collecting Windows Event Log channels
        via the native Windows Event Log API, including pull-mode subscriptions, bookmark-based
        checkpointing, and configurable field filtering.', '`aws_s3` sink supports
        Apache Parquet batch encoding, with auto-generated or supplied schema and
        configurable compression (Snappy/ZSTD/GZIP/LZ4/none).', '`azure_blob` sink
        restores first-class Azure authentication support (Azure CLI, Managed Identity,
        Workload Identity, and Managed Identity-based Client Assertion).', '`datadog_metrics`
        sink defaults to Series v2 endpoint (`/api/v2/series`) and uses `zstd` compression
        for Series v2 and Sketches; includes `series_api_version` option to switch
        back to v1.', '`vector top` output accounting is corrected for multi-output
        components and it now reports Memory Used as disabled when allocation tracing
        is not enabled.', 'Improved internal metrics: new source-send latency distributions,
        more accurate transform utilization (excludes downstream waiting), and fixes
        to buffer utilization tracking; also fixes CPU regression in `file` and `kubernetes_logs`
        sources introduced in 0.50.0.']
    breaking_changes: [Observability API has moved from GraphQL to gRPC; clients and
        tooling that used `/graphql` or `/playground` (including `vector top`/`vector
        tap` integrations) must be updated. `GET /health` is unchanged for Kubernetes
        probes., Top-level `headers` option on `http` and `opentelemetry` sinks has
        been removed; configurations must be adjusted accordingly., '`azure_logs_ingestion`
        sink using Client Secret credentials now requires explicitly setting `azure_credential_kind`.']
  chart_version: 0.52.0
  images: ['docker.io/timberio/vector:0.55.0-distroless-libc']
- version: 0.54.0
  kube: ['1.35', '1.34', '1.33']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: ''
    chart_updates: []
    features: ['Enhanced `vector top` TUI with keybinds for scrolling, sorting, and
        filtering (press `?` for help).', '`datadog_logs` sink now uses `zstd` compression
        by default, improving network efficiency and throughput.', 'New internal metrics:
        `component_latency_seconds` histogram and `component_latency_mean_seconds`
        gauge to measure time events spend inside each component.', 'Syslog encoding
        transform got RFC-compliance and safety improvements, including better handling
        of structured data (scalars/nested objects/arrays) and UTF-8 safety.', New
        `azure_logs_ingestion` sink for Azure Monitor Logs Ingestion API; legacy `azure_monitor_logs`
        sink is deprecated ahead of the Data Collector API retirement (currently Sept
        2026).]
    breaking_changes: ['`datadog_logs` sink default compression changed from none
        to `zstd`; set `compression` explicitly if you need the previous behavior
        (e.g., `none`).']
  chart_version: 0.51.0
  images: ['docker.io/timberio/vector:0.54.0-distroless-libc']
- version: 0.53.0
  kube: ['1.35', '1.34', '1.33']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: ''
    chart_updates: []
    features: ['VRL gained functions to read internal Vector metrics (`get_vector_metric`,
        `find_vector_metrics`, `aggregate_vector_metrics`), backed by snapshots refreshed
        every `metrics_storage_refresh_period`.', '`clickhouse` sink added an `arrow_stream`
        format option using Apache Arrow IPC for higher throughput and smaller payloads
        than JSON.', New `doris` sink added to ship log data to Apache Doris via the
        Stream Load API., New `syslog` codec added for encoding events as Syslog;
        supports RFC5424 and RFC3164., 'New moving-mean (EWMA) gauges for buffer utilization
        added: `source_buffer_utilization_mean` and `transform_buffer_utilization_mean`,
        complementing the existing instant utilization metrics.']
    breaking_changes: []
  chart_version: 0.50.0
  images: ['timberio/vector:0.53.0-distroless-libc']
- version: 0.52.0
  kube: ['1.34', '1.33', '1.32']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: ''
    chart_updates: []
    features: ['Added new internal metrics for source/transform buffer utilization
        (capacity, usage, and historical levels) to improve observability during backpressure/buffering
        scenarios.', Introduced a new `trace_to_log` transform to convert traces into
        log events., 'Blackhole sink now supports end-to-end acknowledgements, enabling
        ack-based delivery semantics even when discarding output.', 'GELF decoder
        gained a `validation` mode (`strict` default, `relaxed` to accept non-compliant
        GELF senders).', '`docker_logs` source now retries Docker daemon communication
        failures using exponential backoff, improving resilience.']
    breaking_changes: []
  chart_version: 0.49.0
  images: ['timberio/vector:0.52.0-distroless-libc']
- version: 0.51.0
  kube: ['1.34', '1.33', '1.32']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: ''
    chart_updates: []
    features: ['New `otlp` codec for bidirectional conversion between Vector events
        and OTLP, improving interoperability with OpenTelemetry collectors/instrumentation.',
      'Improved internal telemetry/metrics correctness: fixes negative utilization
        metrics and buffer counter underflows.', Memory enrichment tables now support
        an `expired` output to export expired cache items; enrichment table outputs
        are also visible via `vector tap`., "(From 0.50.0 context) The `opentelemetry`\
        \ source can decode standard OTLP for logs/metrics/traces, simplifying OTEL\u2192\
        Vector\u2192OTEL pipelines."]
    breaking_changes: ['Upstream release notes for 0.51.0 mention breaking changes
