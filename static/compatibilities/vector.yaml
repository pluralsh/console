        before upgrading.', "Note from 0.50.0: `azure_blob` sink now requires `connection_string`\
        \ authentication (relevant if you\u2019re coming from <0.50.0).", 0.51.0 was
        superseded and maintainers recommend upgrading to 0.51.1 instead of 0.51.0.]
