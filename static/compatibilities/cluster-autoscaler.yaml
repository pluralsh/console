- version: 1.26.2
  kube: ['1.26']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: ''
    chart_updates: []
    features: ['Improved scale-down behavior: Cluster Autoscaler no longer blocks
        scale-down across the whole cluster just because some pods are waiting for
        nodes to boot; it can scale down other node groups while scale-up is in progress.',
      Added a gRPC expander and an external gRPC cloud provider option for extensible
        scaling strategies/providers., Added a debugging snapshot feature to capture
        autoscaler state for troubleshooting., Added `--node-info-cache-expire-time`
        to control how long node templates are cached., 'Improved resilience: autoscaler
        can continue operating even if it cannot remove some VMs that failed to register
        to the cluster.', 'Performance fixes: faster reaction when many similar pods
        exist (e.g., indexed Jobs), improved handling of large scale-ups, and optimizations
        for large environments (e.g., GCE).', 'Improved correctness: fixed multiple
        issues with daemonset accounting during scale-up calculations.', Status ConfigMap
        now includes additional details about nodes with unready resources., 'Cloud/provider
        enhancements: AWS early-abort when ASG has no capacity and tag key `:` support;
        updated instance type lists for AWS/Azure; Azure NP-series support; Cluster
        API multi-node delete fix; provider additions/renames (OracleCloud, TencentCloud,
        Vultr; Packet->Equinix Metal).', 'Azure-specific stability fix in 1.26.2:
        avoids crash in non-public clouds.']
    breaking_changes: ['Container image registry moved from `k8s.gcr.io` to `registry.k8s.io`
        between 1.24.0 and 1.26.2; update your image repository references, mirrors,
        and any allowlists accordingly.']
  chart_version: 9.28.0
  images: ['registry.k8s.io/autoscaling/cluster-autoscaler:v1.26.2']
- version: 1.24.0
  kube: ['1.24']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: ''
    chart_updates: []
    features: [Scale-down no longer blocks cluster-wide when some pods are waiting
        for nodes to boot; scale-down can proceed in other node groups while scale-up
        is happening elsewhere., 'New gRPC expander option and a new External gRPC
        cloud provider, enabling custom expansion logic and providers over gRPC.',
      New debugging snapshot capability to capture autoscaler state for troubleshooting.,
      "Improved resiliency: autoscaler can continue operating even if it can\u2019\
        t delete some VMs that never registered with the cluster.", New --node-info-cache-expire-time
        flag to control caching duration for node templates., 'Provider additions/updates:
        new OracleCloud, TencentCloud, and Vultr providers; Equinix Metal provider
        rename from Packet; instance-type list updates across AWS/Azure and performance
        improvements on GCE.']
    breaking_changes: ['If you build a custom Cluster Autoscaler image or import its
        code, note that the previously deprecated NodeInfoProcessor interface is removed
        in 1.24 and you must migrate to TemplateNodeInfoProvider; official images
        are unaffected.', Go module import of Cluster Autoscaler 1.24.0 may fail to
        compile for downstream projects importing CA code (known issue); this does
        not affect running the official container image.]
  chart_version: 9.27.0
  images: ['registry.k8s.io/autoscaling/cluster-autoscaler:v1.24.0']
- version: 1.23.0
  kube: ['1.23']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: ''
    chart_updates: []
    features: ['`--expander` now supports a comma-separated list of expanders with
        fallback behavior when the first returns multiple node groups.', New `--feature-gates`
        flag to control Kubernetes feature gates for the embedded kube-scheduler code
        used by Cluster Autoscaler., More reliable Kubernetes Events attached to the
        `cluster-autoscaler-status` ConfigMap for every scale-up/scale-down attempt
        (including failures)., Performance improvements for clusters with many pods
        using projected volumes., 'AWS: Instance type discovery now uses the EC2 `DescribeInstanceTypes`
        API (adds NVIDIA A100 support), reduces API calls, and allows per-ASG scale-down
        options.', 'Azure: Per-VMSS scale-down options, optional use of CLI credentials
        instead of service principal, and NVIDIA A100 support.', 'GCE: Per-MIG scale-down
        options, ability to specify SSD ephemeral-storage via instance templates enabling
        scale-from-0 for pods requesting it, and reduced API calls.', New Brightbox
        cloud provider support.]
    breaking_changes: ['AWS default configuration now requires additional IAM permission
        `ec2:DescribeInstanceTypes` due to switching instance type list generation
        to the DescribeInstanceTypes API.', NodeInfoProcessor interface is deprecated
        (removed in 1.24); impacts only users building customized Cluster Autoscaler
        images/plugins and should be migrated to TemplateNodeInfoProvider.]
  chart_version: 9.24.0
  images: ['registry.k8s.io/autoscaling/cluster-autoscaler:v1.23.0']
