- version: 0.31.0
  kube: ['1.31', '1.30', '1.29']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: "## Helm values / behavior changes to review\n- **`replicas` type\
      \ fixed**: `replicas` is now treated as a numeric value (int). If you previously\
      \ set it as a quoted string (e.g. `\"1\"`), update to an integer.\n- **`cmdOption`\
      \ now accepts \u201Cfalsey\u201D values**: Chart templates were adjusted so\
      \ values like `false`, `0`, or empty strings can be passed through intentionally\
      \ (previously they might have been skipped by Helm template logic). Re-check\
      \ any `cmdOptions` overrides to ensure the rendered args are what you expect.\n\
      - **Default `deschedulerPolicy` fixed**: The chart\u2019s built-in/default policy\
      \ rendering was corrected. If you relied on chart defaults, validate that the\
      \ generated policy is still what you want.\n- **Namespace override added**:\
      \ New Helm settings allow overriding the namespace used by chart resources (useful\
      \ for multi-namespace installs or restricting where certain resources land).\
      \ Review and adopt only if needed.\n- **Leader election value typo fixed**:\
      \ Helm value key for leader election namespace corrected to **`resourceNamespace`**.\
      \ If you set the old/typo key, it will be ignored now\u2014rename it.\n- **`securityContext`\
      \ can be conditional**: Chart can now omit `securityContext` for Deployment/CronJob\
      \ based on values. If you depend on a specific `securityContext`, ensure it\
      \ remains enabled/configured after upgrade."
    chart_updates: [Chart templates updated to correctly type `replicas` and handle
        `cmdOption` falsey values., Default deschedulerPolicy templating corrected;
        behavior may differ if you depended on defaults., Added namespace override
        support in the Helm chart., Fixed leader election configuration key to `resourceNamespace`
        in chart values/templates., Made `securityContext` conditional for Deployment
        and CronJob; improved Helm unit tests.]
    features: [Pod evictor enhancements and new options; groundwork for eviction request
        handling and thread-safety improvements., Support for limiting the **total**
        number of pods evicted per rescheduling cycle (`maxNoOfPodsToEvictTotal`).,
      PodLifeTime plugin gained checks for init containers and ephemeral containers.,
      'Integration work for KEP-1397: optional evacuation API flow as an alternative
        to the eviction API (foundational work in this release).']
    breaking_changes: [Removed the `descheduler/v1alpha1` API type. Any manifests/policies
        still referencing v1alpha1 must be updated to the supported policy API version
        used by your deployment., Helm leader election namespace value key corrected
        to `resourceNamespace`; configurations using the old key will stop applying
        after upgrade.]
  chart_version: 0.31.0
  images: ['registry.k8s.io/descheduler/descheduler:v0.31.0']
