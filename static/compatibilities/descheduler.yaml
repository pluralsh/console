- version: 0.21.0
  kube: ['1.21', '1.20', '1.19']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: "### Helm chart changes (descheduler-helm-chart 0.20.0 \u2192 0.21.0)\n\
      - **SecurityContext defaults changed to run as non-root**:\n  - Chart updates\
      \ to run the container as **UID 1000** and support `runAsNonRoot` (#496), matching\
      \ the upstream manifest changes (#495/#468).\n  - **Action**: if you currently\
      \ override `securityContext` / `podSecurityContext`, verify your overrides don\u2019\
      t force root (e.g., `runAsUser: 0`) and that any PSP/OPA/PodSecurity admission\
      \ allows UID 1000.\n- **CronJob scheduling placement**:\n  - Added **`nodeSelector`\
      \ support for the CronJob** (#480).\n  - **Action**: optional\u2014set `nodeSelector`\
      \ if you need to pin the descheduler job to specific nodes.\n- **Docs/values\
      \ fixes**:\n  - Fixed `values.yaml` indentation (#498).\n  - Corrected chart\
      \ docs for container requests/limits (#526).\n- **Helm chart testing**:\n  -\
      \ Added a **helm test** hook (#527).\n"
    chart_updates: [Workload manifests updated to run as non-root (UID 1000) and support
        `runAsNonRoot` (aligns with upstream security changes)., CronJob template
        enhanced with `nodeSelector` support., 'Chart hygiene updates: `values.yaml`
        indentation fix and documentation corrections for resources.', Added Helm
        test hook for basic install validation.]
    features: ['Runs descheduler as non-root by default (UID 1000), improving security
        posture and compatibility with restricted PodSecurity policies.', 'Adds metrics
        collection support, enabling scraping/observability of descheduler behavior.',
      'New/expanded eviction filtering: labelSelector-based filtering, option to ignore
        pods with PVCs, and optional eviction of system-critical pods (configurable).',
      'TopologySpreadConstraint strategy enhancements, including support for soft
        constraints and labelSelector filtering during eviction.', 'New/updated strategies
        and behavior: HighNodeUtilization strategy, improved NodeFit feature, and
        LowNodeUtilization extended resource support.', Updated Kubernetes dependency
        compatibility to 1.21 and expanded multi-arch images (adds ARM32v7).]
    breaking_changes: ['Descheduler now defaults to **running as non-root (UID 1000)**;
        clusters/environments that assume root (custom securityContext, PSP, file
        permissions on mounted volumes, or restrictive policies) may require adjustments.',
      Kubernetes library/dependency bump to **1.21.0** may effectively drop compatibility
        with older Kubernetes versions; validate your cluster version and API availability
        before upgrading.]
  chart_version: 0.21.0
  images: ['alpine:latest', 'k8s.gcr.io/descheduler/descheduler:v0.21.0']
- version: 0.20.0
