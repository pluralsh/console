- version: 0.36.0
  kube: ['1.36', '1.35', '1.34']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: "### Helm values / chart behavior changes\n- **New:** Helm chart\
      \ now supports **initContainers**. If you need pre-start tasks (e.g., copying\
      \ config, waiting for dependencies), you can now define them via values and\
      \ they\u2019ll be rendered into the descheduler Pod.\n- **New/Improved:** **ServiceMonitor\
      \ `apiVersion` can be overridden** via values. This helps clusters running different\
      \ Prometheus Operator versions.\n- **RBAC update:** Helm RBAC/ClusterRole was\
      \ updated to account for **PVC-related failures** observed around 0.35.x; ensure\
      \ you apply the new RBAC on upgrade (don\u2019t reuse old rendered manifests).\n"
    chart_updates: ['Helm chart: add initContainers support.', 'Helm chart: allow
        overriding ServiceMonitor apiVersion.', 'Helm chart: update RBAC/ClusterRole
        to sync with base manifests and fix PVC-related permission issues.', 'Chart
        metadata: icon URL updated.', "CI/security plumbing changes (pinned actions/plugins,\
        \ updated scanners) that don\u2019t affect runtime behavior."]
    features: ["PodLifeTime strategy gained additional filters: condition, container\
        \ exit code, owner kind, and transition time\u2014enabling more precise eviction\
        \ targeting.", Helm chart can now inject init containers into the descheduler
        Pod for pre-start workflows., ServiceMonitor apiVersion is now configurable
        to improve compatibility with different Prometheus Operator versions.]
    breaking_changes: []
  chart_version: 0.36.0
  images: ['registry.k8s.io/descheduler/descheduler:v0.36.0']
