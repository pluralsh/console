  summary:
    helm_changes: '- CronJob args handling was adjusted to avoid Helm unmarshal errors
      (if you set `cronJob.args`, re-check the type/format expected by the chart).

      - New CronJob option: `timeZone` support.

      - New pod-level option: configurable `dnsConfig`.

      - New pod-level option: ability to set Pod `securityContext`.

      - New option: configure `ipFamilyPolicy` (relevant for dual-stack/IPv6 clusters).


      **Action for upgrade:** diff your current `values.yaml` against the new chart
      defaults and specifically validate any custom `cronJob.*`, `dnsConfig`, `securityContext`,
      and networking-related settings (`ipFamilyPolicy`).'
    chart_updates: ["Helm chart version was bumped alongside image updates as part\
        \ of the v0.28.1\u2192v0.29.0 release train.", 'Chart gained additional configurability
        for CronJob (`timeZone`), Pod spec (`dnsConfig`, `securityContext`), and networking
        (`ipFamilyPolicy`).', CronJob args templating/values handling was changed
        to prevent unmarshal errors (can impact existing values).]
    features: ['TopologySpreadConstraints support was expanded (nodeTaintsPolicy,
        nodeAffinityPolicy, and matchLabelKeys handling).', '`PodLifeTime` plugin
        now considers pods in `ImagePullBackOff` container status, which can increase
        the set of pods eligible for eviction under that policy.', 'Logging improvements:
        more structured error logs during eviction and more accurate/human-readable
        node utilization and topologySpreadConstraint fields.']
    breaking_changes: ["Potential Helm values behavior change for CronJob args: prior\
        \ `cronJob.args` values may fail to render or may need to be reformatted due\
        \ to the unmarshal fix\u2014verify during `helm template`/dry-run.", 'Kubernetes
        1.29 dependency/go-version bump: if you run older Kubernetes versions or have
        strict version-skew constraints, validate descheduler compatibility against
        your managed provider/K8s version before upgrading.']
  chart_version: 0.29.0
  images: ['registry.k8s.io/descheduler/descheduler:v0.29.0']
- version: 0.28.1
  kube: ['1.28', '1.27', '1.26']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: "- **CronJob args value type changed/fixed**: The chart updated\
      \ the `cronJob.args`/args handling to avoid YAML\u2192Go unmarshal errors. If\
      \ you previously set args as a string (or in a shape that relied on permissive\
      \ unmarshalling), update to the chart\u2019s expected format (typically a YAML\
      \ list of strings).\n- **New optional CronJob `timeZone` support**: You can\
      \ now set a timezone on the CronJob via a new Helm value (only applies if you\
      \ deploy descheduler as a CronJob and your cluster supports `spec.timeZone`).\n\
      - **New optional `dnsConfig` support**: You can now provide `dnsConfig` via\
      \ values to customize pod DNS settings (nameservers/searches/options)."
    chart_updates: ['Helm chart: fixed CronJob args rendering to prevent unmarshal
