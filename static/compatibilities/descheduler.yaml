  requirements: []
  incompatibilities: []
  summary:
    helm_changes: "## Helm chart / values changes to plan for (0.19.0 \u2192 0.20.0)\n\
      - **Chart renamed** (PR #436). Expect the chart name/release name/repo reference\
      \ to change; verify your `helm upgrade` target and any GitOps references (e.g.,\
      \ `chart:` field, dependency name).\n- **PodSecurityPolicy support added** (PR\
      \ #418). New values/templates may appear for PSP creation/usage; if your cluster\
      \ has PSP enabled (or you manage PSP objects), decide whether to enable/disable\
      \ and ensure RBAC aligns.\n- **CronJob options exposed:** `successfulJobsHistoryLimit`\
      \ and `failedJobsHistoryLimit` are now configurable (PR #453).\n- **CronJob\
      \ startingDeadlineSeconds configurable** (PR #444).\n- **Container resources\
      \ values added** (PR #443). If you previously patched manifests to set resources,\
      \ move those settings into values.\n- **TopologySpreadConstraint strategy namespaces**\
      \ can be configured via Helm (PR #455) \u2014 check your values if you use that\
      \ strategy.\n"
    chart_updates: ["Chart renamed (PR #436) \u2014 update chart reference in Helm/GitOps.",
      'Add PodSecurityPolicy support to the chart templates (PR #418).', 'Expose CronJob
        scheduling/history settings in values: startingDeadlineSeconds, successfulJobsHistoryLimit,
        failedJobsHistoryLimit (PRs #444, #453).', 'Add container resource configuration
        in chart (PR #443).', 'Helm support for listing namespaces for topologySpreadConstraint
        strategy (PR #455).']
    features: [New **PodTopologySpread** strategy to rebalance pods across topology
        domains (#413)., RemoveDuplicates and TopologySpread-related strategies gain
        **namespace filtering** (#406) and improved namespace handling (#455)., PodLifeTime
        strategy can now customize which **podStatusPhases** count (#393)., 'New logging-format
        flag and broader structured logging improvements (#412, #376/#394).', 'Helm/chart
        improvements: PSP support, CronJob timing and history limits, configurable
        resources (#418, #444, #453, #443).', 'Descheduler updated for Kubernetes
        1.20 dependencies and multi-arch images (#464, #449).']
    breaking_changes: [Helm **chart rename** may break automated upgrades or GitOps
        references until you update the chart name/repo/path (#436)., "If you relied\
        \ on old CLI flags previously deprecated in 0.19.0 (node-selector, max-pods-to-evict-per-node,\
        \ evict-local-storage-pods), 0.20.0 continues the move toward policy fields;\
        \ validate your deployment isn\u2019t still depending on removed/ignored flags."]
  chart_version: 0.20.0
  images: ['k8s.gcr.io/descheduler/descheduler:v0.20.0']
