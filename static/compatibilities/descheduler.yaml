- version: 0.34.0
  kube: ['1.34', '1.33', '1.32']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: "- **Chart values cleanup:** v0.34.0 removes references to **obsolete\
      \ `deschedulerPolicy` fields** from the chart values. If you previously set\
      \ any of those old fields in `values.yaml`, they may now be ignored or cause\
      \ template/render issues\u2014reconcile your values with the current chart schema.\n\
      - **`deschedulerPolicy` is now templated:** the chart runs `deschedulerPolicy`\
      \ through Helm\u2019s `tpl` function, enabling you to use Helm templating inside\
      \ the policy content. This can change behavior if you had `{{ ... }}` sequences\
      \ that were meant to be literal\u2014escape them if needed.\n- **Default evictor\
      \ behavior changed in chart:** the chart stops shipping **no-op default evictor\
      \ settings** and now supports/uses **`podProtections` args**. If you relied\
      \ on the chart\u2019s prior default evictor block being present, you may need\
      \ to explicitly set `defaultEvictor` / `DefaultEvictorArgs` in your policy.\n\
      - **Deployment token setting:** the Deployment now hard-sets `automountServiceAccountToken:\
      \ true`. If you intentionally disabled token mounting, you\u2019ll need to revisit\
      \ whether the chart still allows overriding this.\n- **Chart knobs/metadata:**\n\
      \  - Adds `activeDeadlineSeconds` for the CronJob.\n  - Adds labels/annotations\
      \ support for CronJob/Job.\n  - Adds support for **custom annotations on the\
      \ Deployment**.\n  - Fixes the chart\u2019s **liveness probe timeout**.\n- **RBAC/permissions\
      \ note:** if you use the built-in metrics collector / Prometheus integration,\
      \ re-check RBAC after upgrade (v0.33.0 added perms when metricsCollector enabled;\
      \ v0.34.0 expands Prometheus options)."
    chart_updates: [Removes references to deprecated/obsolete `deschedulerPolicy`
        fields from chart values., Renders `deschedulerPolicy` via Helm `tpl` for
        more flexible templating., Updates default evictor configuration approach
        (removes no-op defaults; aligns with `podProtections`)., 'Sets `automountServiceAccountToken:
        true` on the Deployment.', Adds `activeDeadlineSeconds` to CronJob spec in
        the chart., Adds labels/annotations propagation to CronJob/Job; adds customizable
        Deployment annotations., Fixes liveness probe timeout in the chart.]
    features: [RemovePodsHavingTooManyRestarts can now sort candidate pods by restart
        count to evict the worst offenders first., 'Prometheus metrics source supports
        different URL schemes (e.g., http/https) for more flexible configuration.',
      Eviction requests can include annotations to improve observability/auditing.,
      'DefaultEvictorArgs gains PodProtections (including an option for pods with
        resource claims), improving safety controls on what can be evicted.', 'PodLifeTime
        plugin can now allow Succeeded/Failed pod phases when configured, broadening
        what it can act on.']
    breaking_changes: [The chart removed obsolete `deschedulerPolicy` value fields;
        existing `values.yaml` that still set them must be updated to the new structure
        or they will no longer take effect., '`deschedulerPolicy` is processed with
        `tpl`; unescaped `{{ ... }}` sequences inside the policy may now be evaluated
        as templates, changing rendered output compared to previous versions.', Default
        evictor defaults changed (no more no-op defaults); if you relied on implicit/default
        evictor settings you may need to explicitly configure `DefaultEvictorArgs`/`podProtections`
        to preserve prior behavior.]
  chart_version: 0.34.0
  images: ['registry.k8s.io/descheduler/descheduler:v0.34.0']
- version: 0.33.0
  kube: ['1.33', '1.32', '1.31']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: '- No explicit Helm *values* key changes are called out in the provided
      notes. Expect chart/image version bumps as part of the upgrade.

      - `cmdOptions.dry-run` is now mentioned in the chart README (documentation-only);
      if you want a non-disruptive test run, you can enable dry-run via `cmdOptions.dry-run`.

      - RBAC: chart adds missing permissions for policy resources, and adds extra
      permissions when `metricsCollector` is enabled. If you have custom RBAC overrides,
      re-validate them against the new chart.

      '
    chart_updates: [Chart/image version bumps to align with descheduler v0.33.0.,
      'RBAC fixes: add missing permission for policy at ClusterRole.', RBAC additions
        when `metricsCollector` is enabled., 'Docs/NOTES changes in chart: move values.yaml
        comment about custom configmap into NOTES.txt output; README updated to mention
        `cmdOptions.dry-run`.', Manifests/docs updated for v0.33.0.]
    features: ['Adds `grace_period_seconds` to `DeschedulerPolicy`, allowing a configurable
        grace period for pod eviction.', LowNodeUtilization gains per-plugin `evictionLimits`
        to cap evictions., "Low/NodeUtilization can integrate with Prometheus for\
        \ \u201Cactual utilization\u201D and allows selecting a metrics source via\
        \ a string for extensibility.", "Introduces a \u201Cstrict eviction policy\u201D\
        \ mode to tighten eviction behavior.", 'Node utilization computation becomes
        more generic, can report utilization for selected resources, and skips nodes
        lacking required extended resources when averaging.']
    breaking_changes: [Potential behavior changes in Low/NodeUtilization plugins due
        to refactoring of thresholds/usage assessment and more generic node classification;
        validate outcomes in a staging cluster before production rollout., "If you\
        \ rely on custom/minimal RBAC, the chart\u2019s new/changed permissions (especially\
        \ for policy resources and `metricsCollector`) may require updating your security\
        \ review/overrides to avoid install/upgrade failures."]
  chart_version: 0.33.0
  images: ['registry.k8s.io/descheduler/descheduler:v0.33.0']
