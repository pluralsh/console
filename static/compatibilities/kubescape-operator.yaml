        CRDs for risk acceptance workflows., Chart now supports/threads through the
        kubevuln risk acceptance configuration (when enabled).]
    breaking_changes: ['If you rely on `operator.httpExporterConfig` with `synchronizer.enabled=false`,
        that configuration will no longer be deployed because it is now gated; you
        must enable the synchronizer or adjust your configuration approach.']
