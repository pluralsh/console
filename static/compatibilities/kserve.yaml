- version: 0.17.0
  kube: ['1.35', '1.34', '1.33', '1.32']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: "## Helm chart changes you must account for\n\n- **Major chart restructuring\
      \ (breaking):** the previous single `kserve` chart (e.g., `helm-chart-kserve-v0.16.0.tgz`)\
      \ is split into multiple charts in `v0.17.0`. Expect **new release names, new\
      \ chart names, and potentially different upgrade ordering**.\n- **Chart rename:**\
      \ the main chart name changes from **`kserve` \u2192 `kserve-resources`** (`refactor:\
      \ change kserve chart name to kserve-resources`).\n- **New/explicit charts to\
      \ install:**\n  - `kserve-crd` (+ `kserve-crd-minimal`)\n  - `kserve-resources`\n\
      \  - `kserve-runtime-configs` (new)\n  - `kserve-localmodel-crd`, `kserve-localmodel-resources`\
      \ (new split)\n  - `kserve-llmisvc-crd` (+ minimal), `kserve-llmisvc-resources`\n\
      - **LLMISVC chart naming/RBAC:** LLMISVC artifacts get **`kserve` prefixes/suffixes**\
      \ (e.g., chart naming, roles), and ClusterRoleBinding is updated to point to\
      \ the new ClusterRole. If you had custom RBAC overlays, re-validate them.\n\
      - **New values knobs introduced (check and set as needed):**\n  - `servingRuntimes.imagePullPolicy`\
      \ (new helm value for serving runtimes)\n  - Agent container **resources configurable**\
      \ (new value; exact key not in notes)\n  - LLMISVC scheduler config can be provided\
      \ via **ConfigMap or inline**; scheduler now expects default ZMQ port **5557**\n\
      - **Patching/overlays workflow changed:** \"restructure helm charts and the\
      \ way how to patch\" implies any existing post-render, kustomize overlays, or\
      \ `helm template | yq` patch steps likely need updates to new paths/resource\
      \ names.\n\n### Practical upgrade implications\n\n- You likely need to:\n  1.\
      \ **Install/upgrade CRD charts first** (`kserve-crd`, `kserve-llmisvc-crd`,\
      \ `kserve-localmodel-crd`) and wait for CRDs to be established.\n  2. Then upgrade/install\
      \ **resource charts** (`kserve-resources`, `kserve-llmisvc-resources`, `kserve-localmodel-resources`,\
      \ `kserve-runtime-configs`).\n  3. Adjust your Helm release names, chart references,\
      \ and any GitOps automation that assumed `kserve` was a single chart.\n\n*(Release\
      \ notes do not include a full values.yaml diff; you should run `helm show values`\
      \ for v0.16.0 vs v0.17.0 charts and reconcile.)*"
    chart_updates: ['Helm packaging now publishes multiple artifacts instead of a
        single kserve chart; v0.17.0 release assets include CRD-only and resources-only
        charts for KServe, LLMISVC, and LocalModel, plus a new runtime-configs chart.',
      Manifests are restructured to a component-based layout (will change rendered
        resource names/paths used by scripts/patching)., LLMISVC CRD installation
        paths fixed; LLMISVC RBAC naming updated with `kserve` prefixes and bindings
        adjusted accordingly., Quick install / dependency install scripts were centralized/refactored;
        installation scripts updated to include required files and to fix several
        bugs., 'Controller/webhook architecture change: LocalModelCache webhook separated
        from KServe controller; LLMInferenceService webhook added with E2E tests (may
        add/modify webhook deployments/services).', 'Security and dependency refreshes
        across images and python deps (e.g., starlette pin, cryptography CVE fixes),
        plus path traversal hardening in HTTP/tar extraction.']
    features: ['Storage initializer performance improvements: parallel S3/Azure blob
        downloads and faster parallel S3 file downloads; plus new git download support
        and ability to download only selected files.', New routing capability for
        InferenceServices via `pathTemplate` configuration for inference service routing.,
      'Additional runtimes added, including an OpenVINO model server runtime and a
        new predictive inference server runtime (with build/publish and E2E coverage).',
      'LLMISVC enhancements: ability to stop LLMInferenceService, optional storageInitializer,
        scheduler HA/scaling support, improved CA bundle/cert management, improved
        Gateway API URL discovery, autoscaling API support, and annotation/label propagation.',
      'Gateway/API updates: upgrade to Gateway API v1.4.0 and bump Gateway API Inference
        Extension (GIE) to v1.2.0.', 'Operational knobs: new env var `INFERENCE_SERVICE_NAME`,
        new `schedulerName` field for ServingRuntimePodSpec, configurable Uvicorn
        event loop, and configurable agent container resources.']
    breaking_changes: ['Major Helm chart restructuring in v0.17.0: the old single
        `kserve` chart is replaced/renamed and split into multiple charts (notably
        `kserve-resources`, plus separate CRD/resources charts for KServe/LLMISVC/LocalModel).
        Existing Helm release names, chart references, and patching automation will
        need changes.', 'vLLM/runtime ecosystem changes: KServe bumps vLLM versions
        and removes Python 3.9 support for the vLLM runtime line; if you build custom
        runtime images or depend on Python 3.9, you must update accordingly.', RBAC/name
        changes for LLMISVC components (prefixed roles/renamed resources) can break
        custom RoleBinding/ClusterRoleBinding overrides if they referenced old names.]
  chart_version: v0.17.0
  images: []
- version: 0.16.0
  kube: ['1.35', '1.34', '1.33', '1.32']
  requirements: []
  incompatibilities: []
  summary:
    helm_changes: "- **kserve-resources chart:** release notes mention updates to\
      \ the `kserve-resources` Helm chart to **disable \u201Cdesired servingruntimes\u201D\
      ** by default (verify if you were relying on those defaults).\n- **Helm values\
      \ exposure:** the chart now **exposes `uidModelcar`** as a configurable value\
      \ (if you need deterministic UID/GID behavior for ModelCar).\n- **OpenTelemetry\
      \ + autoscaler values:** Helm now **enables configuration options** for `opentelemetryCollector`\
      \ and `autoscaler` (review your values file for new/renamed knobs and decide\
      \ whether to explicitly set them).\n- **New Helm charts/components:** v0.16\
      \ introduces Helm packaging for **LLMInferenceService (llmisvc)** including\
      \ webhook configuration and a minimal CRD chart fix; if you don\u2019t plan\
      \ to run LLMISVC, ensure it\u2019s disabled/not installed.\n- **CRD manifest\
      \ naming:** CRD file was renamed to reflect all KServe CRDs; if you manage CRDs\
      \ separately (GitOps), ensure your CRD sync picks up the renamed file."
    chart_updates: ['Added/updated Helm templates and install logic for the new LLMInferenceService
        (llmisvc) controller and webhooks, plus RBAC/templating fixes and a quick-install
        script.', Chart now surfaces additional configuration for OpenTelemetry collector
        and autoscaler components., 'Bugfixes to chart packaging (e.g., llmisvc-crd-minimal
        chart) and a fix to the controller image URL reference.', '`kserve-resources`
        chart behavior changed to not enable desired ServingRuntimes by default (confirm
        ServingRuntime availability post-upgrade).']
    features: ['Introduces new **LLMInferenceService** and **LLMInferenceServiceConfig**
        CRDs/controllers (llmisvc) aimed at LLM workloads, with validating webhooks
        and base configurations.', "Adds **stop/resume** capabilities across components\
        \ (InferenceService, Transformer, Explainer, InferenceGraph), including support\
        \ in \u201Craw/standard\u201D deployments.", 'Adds **inference logging to
        blob storage**, expanding support to **GCS and Azure** in addition to prior
        backends, with metadata/header handling improvements.', 'Adds support for
        **multiple storage URIs** on InferenceServices and secure/extended storage
        configuration options (e.g., S3 via secret data, CA bundle injection).', 'Improves
        autoscaling/observability integrations: more flexible OpenTelemetry metrics
        support for autoscaling and options for securing Prometheus access in KEDA.',
      'Runtime and dependency bumps/updates, including **vLLM 0.9.x** updates and
        **Torch 2.6/2.7** upgrades in related images/components.']
    breaking_changes: ["Compatibility change: **removed \u201Cdefault\u201D suffix\
        \ compatibility** (if you relied on legacy resource naming/selection that\
        \ used a `-default` suffix, you may need to update manifests or references).",
      'Python SDK/deps: **dropped Pydantic v1 support** (SDK consumers using Pydantic
        v1 must upgrade to v2 or pin/adjust integrations).', 'Removed deprecated flag:
        **`EnableDirectPvcVolumeMount`** was removed (clusters/config relying on this
        feature flag must migrate to the supported PVC/modelcar/storage patterns).',
      'API validation tightening: **disallow `name` field in standard predictor**
        (manifests that set this field will fail validation/admission).', "Terminology/refactor:\
        \ \u201CRawDeployment\u201D renamed to **\u201CStandard\u201D** and \u201C\
        Serverless\u201D to **\u201CKNative\u201D** in code/docs; expect configuration/docs/fields\
        \ to reflect the new naming (verify any automation that keys off old terms)."]
  chart_version: v0.16.0
