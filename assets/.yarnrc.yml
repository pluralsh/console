nodeLinker: node-modules

# packageExtensions patches manifests of upstream packages so that their
# nested peer dependencies are visible to Yarn. Ranges below mirror what
# the requesting package declares so we don't silently accept incompatible
# major-version bumps. Re-audit on dependency upgrades; if a rule becomes
# redundant Yarn will warn with YN0068.
packageExtensions:
  # Algolia + DocSearch: nested @algolia/autocomplete-shared declares peers
  # for algoliasearch / @algolia/client-search, but the parents in the chain
  # don't, so Yarn can't see the root-installed deps satisfy them.
  '@algolia/autocomplete-core@*':
    peerDependencies:
      '@algolia/client-search': '>= 4.9.1 < 6'
      algoliasearch: '>= 4.9.1 < 6'
      search-insights: '>= 1 < 3'
  '@algolia/autocomplete-plugin-algolia-insights@*':
    peerDependencies:
      '@algolia/client-search': '>= 4.9.1 < 6'
      algoliasearch: '>= 4.9.1 < 6'
  '@docsearch/react@*':
    peerDependencies:
      '@algolia/client-search': '>= 4.9.1 < 6'
      algoliasearch: '>= 4.9.1 < 6'

  # Apollo sandbox: graphql-ws + subscriptions-transport-ws both peer-depend
  # on graphql, and @apollo/sandbox doesn't forward the requirement.
  '@apollo/sandbox@*':
    peerDependencies:
      graphql: '^15.7.2 || ^16.0.0'

  # Nivo: every chart package's nested deps (@react-spring/web,
  # react-virtualized-auto-sizer) need react-dom but Nivo only forwards
  # react. Range mirrors Nivo's own react peer.
  '@nivo/annotations@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/arcs@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/axes@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/colors@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/core@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/geo@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/legends@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/line@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/pie@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/polar-axes@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/radial-bar@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/text@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/tooltip@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/treemap@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'
  '@nivo/voronoi@*':
    peerDependencies:
      react-dom: '^16.14 || ^17.0 || ^18.0 || ^19.0'

  # Storybook 9.1.x: nested @mdx-js/react / @typescript-eslint/utils /
  # @testing-library/user-event need types and tooling deps the storybook
  # parents don't forward. Fixed upstream in 10.4 (storybookjs/storybook#34641).
  '@storybook/addon-docs@*':
    peerDependencies:
      '@types/react': '^16.8.0 || ^17.0.0 || ^18.0.0 || ^19.0.0'
  eslint-plugin-storybook@*:
    peerDependencies:
      typescript: '>=4.8.4 <6.1.0'
  storybook@*:
    peerDependencies:
      '@testing-library/dom': '>=7.21.4'

  # Babel plugin: @babel/plugin-syntax-jsx wants @babel/core; the styled-
  # components plugin doesn't forward it.
  babel-plugin-styled-components@*:
    peerDependencies:
      '@babel/core': '^7.0.0-0'

plugins:
  - path: .yarn/plugins/@yarnpkg/plugin-interactive-tools.cjs
    spec: '@yarnpkg/plugin-interactive-tools'
  - path: .yarn/plugins/@yarnpkg/plugin-postinstall.cjs
    spec: 'https://raw.githubusercontent.com/gravitywelluk/yarn-plugin-postinstall/master/bundles/%40yarnpkg/plugin-postinstall.js'

postinstall: cd ../ && npx husky assets/.husky

yarnPath: .yarn/releases/yarn-3.6.0.cjs
