      edges {
        node {
          id
          crontab
          prompt
          nextRunAt
        }
      }
    }
    webhooks(first: 30) {
      edges {
        node {
          id
          name
          prompt
          webhook {
            id
            name
            type
            url
          }
          issueWebhook {
            ...IssueWebhook
          }
        }
      }
    }
    chatbots(first: 30) {
      edges {
        node {
          id
          channel
          chatConnection {
            ...ChatProviderConnection
          }
        }
      }
    }
  }
}

