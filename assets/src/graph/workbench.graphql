fragment WorkbenchTiny on Workbench {
  id
  name
  description
  agentRuntime {
    id
    name
    type
  }
  tools {
    ...WorkbenchToolTiny
  }
  webhooks(first: 50) {
    edges {
      node {
        ...WorkbenchWebhookTiny
      }
    }
  }
}

fragment WorkbenchWebhookTiny on WorkbenchWebhook {
  id
  name
  webhook {
    id
    type
  }
  issueWebhook {
    id
    provider
  }
}

fragment Workbench on Workbench {
  ...WorkbenchTiny
  systemPrompt
  agentRuntime {
    id
    name
  }
  repository {
    id
  }
  configuration {
    infrastructure {
      services
      stacks
      kubernetes
    }
    coding {
      mode
      repositories
    }
  }
  skills {
    ref {
      ref
      folder
    }
    files
  }
  tools {
    ...WorkbenchTool
  }
  readBindings {
    ...PolicyBinding
  }
  writeBindings {
    ...PolicyBinding
  }
}

fragment WorkbenchToolTiny on WorkbenchTool {
  id
  name
  tool
  categories
}

fragment WorkbenchTool on WorkbenchTool {
  ...WorkbenchToolTiny
  configuration {
    http {
      url
      method
      headers {
        name
        value
      }
      body
      inputSchema
    }
    datadog {
      site
    }
    elastic {
      index
      url
      username
    }
    loki {
      url
      username
      tenantId
    }
    prometheus {
      url
      username
      tenantId
    }
    tempo {
      url
      username
      tenantId
    }
    atlassian {
      email
      url
    }
    linear {
      url
    }
    splunk {
      url
      username
    }
    cloudwatch {
      logGroupNames
      region
      roleArn
      roleSessionName
    }
    dynatrace {
      url
    }
  }
}

fragment WorkbenchJobThought on WorkbenchJobThought {
  id
  content
  toolName
  toolArgs
  activity {
    id
  }
  attributes {
    logs {
      ...WorkbenchJobActivityLog
    }
    metrics {
      ...WorkbenchJobActivityMetric
    }
  }
}

fragment WorkbenchJobResultTodo on WorkbenchJobResultTodo {
  name
  description
  done
}

fragment WorkbenchJobActivityMetric on WorkbenchJobActivityMetric {
  timestamp
  name
  value
  labels
}

fragment WorkbenchJobActivityLog on WorkbenchJobActivityLog {
  timestamp
  message
  labels
}

fragment WorkbenchJobResult on WorkbenchJobResult {
  id
  workingTheory
  conclusion
  topology
  todos {
    ...WorkbenchJobResultTodo
  }
  metadata {
    metrics {
      ...WorkbenchJobActivityMetric
    }
  }
}

fragment WorkbenchJobTiny on WorkbenchJob {
  id
  prompt
  status
  user {
    name
  }
  workbench {
    id
  }
}

fragment WorkbenchJobActivityResult on WorkbenchJobActivityResult {
  output
  error
  jobUpdate {
    diff
    workingTheory
    conclusion
  }
  metrics {
    ...WorkbenchJobActivityMetric
  }
  logs {
    ...WorkbenchJobActivityLog
  }
}

fragment WorkbenchJobActivity on WorkbenchJobActivity {
  id
  type
  status
  prompt
  insertedAt
  result {
    ...WorkbenchJobActivityResult
  }
  agentRun {
    ...AgentRunTiny
  }
  agentRuns {
    ...AgentRunTiny
  }
}

fragment WorkbenchJobActivityWithThoughts on WorkbenchJobActivity {
  ...WorkbenchJobActivity
  thoughts {
    ...WorkbenchJobThought
  }
}

fragment WorkbenchJobProgress on WorkbenchJobProgress {
  activityId
  tool
  text
  arguments
}

fragment WorkbenchTextStream on WorkbenchTextStream {
  activityId
  text
}

fragment WorkbenchCron on WorkbenchCron {
  id
  crontab
  prompt
  lastRunAt
  nextRunAt
  insertedAt
  updatedAt
}

fragment WorkbenchPrompt on WorkbenchPrompt {
  id
  prompt
  insertedAt
  updatedAt
}

fragment WorkbenchWebhook on WorkbenchWebhook {
  id
  name
  matches {
    regex
    substring
    caseInsensitive
  }
  insertedAt
  updatedAt
  webhook {
    id
    name
    type
    url
  }
  issueWebhook {
    id
    name
    url
    provider
  }
}

fragment WorkbenchIssue on Issue {
  id
  title
  externalId
  provider
  status
  url
  insertedAt
  updatedAt
  workbench {
    id
  }
  workbenchJob {
    id
    status
  }
}

fragment WorkbenchJob on WorkbenchJob {
  ...WorkbenchJobTiny
  insertedAt
  workbench {
    id
    name
    tools {
      ...WorkbenchToolTiny
    }
  }
  error
  alert {
    ...Alert
  }
  issue {
    id
    title
    externalId
    insertedAt
    status
    url
    provider
  }
  result {
    ...WorkbenchJobResult
  }
  pullRequests {
    ...PullRequestBasic
  }
}

query Workbenches($first: Int = 100, $after: String, $q: String) {
  workbenches(first: $first, after: $after, q: $q) {
    pageInfo {
      ...PageInfo
    }
    edges {
      node {
        ...WorkbenchTiny
      }
    }
  }
}

query WorkbenchesAlerts($first: Int = 100, $after: String) {
  workbenchAlerts(first: $first, after: $after) {
    pageInfo {
      ...PageInfo
    }
    edges {
      node {
        ...Alert
      }
    }
  }
}

query Workbench($id: ID, $name: String) {
  workbench(id: $id, name: $name) {
    ...Workbench
  }
}

query WorkbenchJobs($id: ID!, $first: Int = 100, $after: String) {
  workbench(id: $id) {
    id
    runs(first: $first, after: $after) {
      pageInfo {
        ...PageInfo
      }
      edges {
        node {
          ...WorkbenchJobTiny
        }
      }
    }
  }
}

query WorkbenchAlerts($id: ID!, $first: Int = 100, $after: String) {
  workbench(id: $id) {
    id
    alerts(first: $first, after: $after) {
      pageInfo {
        ...PageInfo
      }
      edges {
        node {
          ...Alert
        }
      }
    }
  }
}

query WorkbenchesIssues($first: Int = 100, $after: String) {
