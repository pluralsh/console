fragment LogLine on LogLine {
  facets {
    ...LogFacet
  }
  log
  timestamp
}

fragment LogFacet on LogFacet {
  key
  value
}

fragment LogFacetDetail on LogFacetDetail {
  label
  count
}

fragment LogAggregationBucket on LogAggregationBucket {
  timestamp
  count
}

query LogAggregation(
  $clusterId: ID
  $limit: Int
  $query: String
  $serviceId: ID
  $time: LogTimeRange
  $facets: [LogFacetInput]
) {
  logAggregation(
    clusterId: $clusterId
    limit: $limit
    query: $query
    serviceId: $serviceId
    time: $time
    facets: $facets
  ) {
    ...LogLine
  }
}

query LogLabels(
  $field: String!
  $clusterId: ID
  $serviceId: ID
  $query: String
  $time: LogTimeRange
) {
  logLabels(
    field: $field
    clusterId: $clusterId
    serviceId: $serviceId
    query: $query
    time: $time
  ) {
    ...LogFacetDetail
  }
}

query LogAggregationBuckets(
  $serviceId: ID
  $clusterId: ID
  $query: String
  $time: LogTimeRange
  $aggregation: LogAggregationInput
  $facets: [LogFacetInput]
) {
  logAggregationBuckets(
    serviceId: $serviceId
    clusterId: $clusterId
    query: $query
    time: $time
    aggregation: $aggregation
    facets: $facets
  ) {
    ...LogAggregationBucket
  }
}
