fragment AwaitingReviewStack on InfrastructureStack {
  id
  name
  status
  runs(first: 50) {
    edges {
      node {
        id
        status
        message
        approvalResult {
          reason
          result
        }
        configuration {
          aiApproval {
            enabled
          }
        }
        pullRequest {
          id
          title
        }
      }
    }
  }
}

fragment AwaitingReviewAgentRunMessage on AgentMessage {
  id
  metadata {
    tool {
      name
      input
      output
    }
  }
}

fragment AwaitingReviewAgentRun on AgentRun {
  id
  status
  prompt
  repository
  runtime {
    id
    name
    type
  }
  analysis {
    summary
  }
  pullRequests {
    ...PullRequestBasic
  }
  messages {
    ...AwaitingReviewAgentRunMessage
  }
}

fragment AwaitingReviewWorkbenchJobLink on WorkbenchJob {
  id
  workbench {
    id
  }
  activities(first: 10) {
    edges {
      node {
        agentRun {
          id
        }
        agentRuns {
          id
        }
      }
    }
  }
}

query PendingApprovalStacks($first: Int = 50) {
  infrastructureStacks(first: $first, status: PENDING_APPROVAL) {
    edges {
      node {
        ...AwaitingReviewStack
      }
    }
  }
}

query PendingApprovalAgentRuns($first: Int = 100) {
  agentRuns(first: $first, status: PENDING_APPROVAL) {
    edges {
      node {
        ...AwaitingReviewAgentRun
      }
    }
  }
}

query AwaitingReviewWorkbenchJobLinks($count: Int = 20) {
  recentWorkbenchJobs(count: $count) {
    ...AwaitingReviewWorkbenchJobLink
  }
}
